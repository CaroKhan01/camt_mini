name: Build CAMT Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This adds a button to let you run it manually

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install spacy pyinstaller
        python -m spacy download en_core_web_sm

    - name: Build Windows Executable
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "citation_averages.json;." --add-data "citation_percentiles.json;." --collect-all en_core_web_sm camt_gui.py

    - name: Build Mac Application
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "citation_averages.json:." --add-data "citation_percentiles.json:." --collect-all en_core_web_sm camt_gui.py
        
        # Mac applications are actually folders. We must zip it so it can be downloaded.
        cd dist
        zip -r camt_gui_mac.zip camt_gui.app

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: CAMT-Windows-App
        path: dist/camt_gui.exe

    - name: Upload Mac Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: CAMT-Mac-App
        path: dist/camt_gui_mac.zip
